<!DOCTYPE html>
<html lang="pl-PL">

<head>
    <title>Drewno Artek</title>

    <link rel="stylesheet" href="./style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'> 
    <link rel="icon" type="image/x-icon" href="./assets/logo/logo plik otwarty jedno złote.png">
    <meta charset="utf-8">
    <script>
        function onFocusText(ft, text){
            if(ft.value === text){
                ft.value = "";
                ft.style.color = 'black';
            }
        }
        function onLostFocus(ft, text){
            if(ft.value === ""){
                ft.value = text;
                ft.style.color = 'grey';
            }
        }
    </script>
    
</head>
<body>
    <nav class="w-100 row m-0 p-0">
        <div class="row pb-2 fw-bold">
            <div class="col-md-12 col-xl-3">
                <img src="./assets/logo/logo bez tła.png" alt="Logo" class="d-block p-0" style="height: 170px;">
            </div>
            <div class="col-sm-12 col-md-4 col-xl-3 pt-3">
                <div class="pt-4 headerButton">
                    <a href="" class="d-block text-center p-4">
                        Strona główna
                    </a>
                </div>
            </div>
            <div class="col-sm-12 col-md-4 col-xl-3 pt-3">
                <div class="pt-4 headerButton">
                    <a href="" class="d-block text-center p-4">
                        Realizacje
                    </a>
                </div>
            </div>
            <div class="col-sm-12 col-md-4 col-xl-3 pt-3">
                <div class="pt-4 headerButton">
                    <a href="" class="d-block text-center p-4">
                        Kontakt
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <form action="" method="get">
                        
                        

                <input type="text" value="Imie i nazwisko" name="ProdName" class="form-control mx-auto" onclick="onFocusText(this, 'Imie i nazwisko')" onfocusout="onLostFocus(this, 'Imie i nazwisko')" style="color: grey">
                        
                <input type="text" value="Adres e-mail, lub telefon" name="contact" class="form-control mx-auto" onclick="onFocusText(this, 'Adres e-mail, lub telefon')" onfocusout="onLostFocus(this, 'Adres e-mail, lub telefon')" style="color: grey">
                        
                <textarea name="" id="" value="Wiadomość..." name="message" class="form-control mx-auto" onclick="onFocusText(this, 'Wiadomość...')" onfocusout="onLostFocus(this, 'Wiadomość...')" style="color: grey"></textarea>
                        
                <input type="submit" value="Wyślij" class="btn btn-light mb-2 mt-1">
            </form>
        </div>
    </main>
    <footer class="w-100 row d-block m-0 p-0">
            <div class="d0 col">
                <ul class="text-center">
                    <div class="pt-1 fw-bold">
                        Odnośniki:
                    </div>
                    <div class="row pt-2">
                            <li class="pt-3 col-4">
                                <a href="">Strona główna</a>
                            </li>
                            <li class="pt-3 col-4">
                                <a href="">Realizacje</a>
                            </li>
                        
                            <li class="pt-3 col-4">
                                <a href="">Kontakt</a>
                            </li>
                    </div>
                </ul>
            </div>
            <div class="d1 row p-5 fw-bold">
                <div class="col-sm-12 col-md-3">
                    +48 999 000 999<br>
                    <a href="" style="text-decoration:none;" class="a1"><i class='bx bxl-facebook-circle bx-sm bx-fw'></i> znajdź nas na Facebooku</a><br>
                    <a href="" style="text-decoration:none;" class="a2"><i class='bx bxl-instagram bx-sm bx-fw' ></i> oraz Instagramie</a>
                </div>
                <div class="col-sm-12 col-md-9 text-center pt-sm-3">
                    This is Website of a woodworking brand located in Poland.
                </div>
                
            </div>
        <div class="d2 text-center font-monospace">
            Designed & Developed by Wojciech Prusaczyk
        </div>
    </footer>
</body>
</html>
