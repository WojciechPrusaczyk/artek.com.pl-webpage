<!DOCTYPE html>

    <meta charset="utf-8">
    <script>
        function onFocusText(ft, text){
            if(ft.value === text){
                ft.value = "";
                ft.style.color = 'black';
            }
        }
        function onLostFocus(ft, text){
            if(ft.value === ""){
                ft.value = text;
                ft.style.color = 'grey';
            }
        }
    </script>
</head>
